<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>アイデアラボ</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />

  <!-- アイデアファイルの一覧 -->
  <script src="manifest.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #1c3461;
      --text:  #1a2a4a;
    }

    body {
      font-family: "Noto Sans JP", "Hiragino Sans", sans-serif;
      background: var(--navy);
    }

    /* ===== ページ全体（PDF キャプチャ対象） ===== */
    .page {
      position: relative;
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ===== 背景画像（imgタグで印刷対応） ===== */
    .bg-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: brightness(0.85) saturate(0.7);
      z-index: 0;
    }

    /* 白オーバーレイで全体を明るく */
    .bg-overlay {
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, 0.32);
      z-index: 0;
    }

    /* ===== コンテンツ ===== */
    .wrapper {
      position: relative;
      z-index: 1;
      width: min(1140px, 96vw);
      padding: 40px 0 56px;
    }

    /* ===== タイトルカード ===== */
    .title-card {
      background: rgba(255, 255, 255, 0.94);
      border-radius: 12px;
      border: 1.5px solid rgba(28, 52, 97, 0.14);
      border-left: 5px solid var(--navy);
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.11);
      padding: 18px 28px;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 28px;
      position: relative;
      overflow: visible;
    }

    .title-left { min-width: 0; flex: 1; }

    .title-label {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.3em;
      color: var(--navy);
      opacity: 0.85;
      margin-bottom: 7px;
    }

    .title-main {
      font-size: clamp(1.3rem, 2.6vw, 1.9rem);
      font-weight: 700;
      color: var(--navy);
      letter-spacing: 0.06em;
    }

    .title-sub {
      font-size: 0.78rem;
      font-weight: 400;
      color: var(--text);
      opacity: 0.85;
      margin-top: 5px;
      letter-spacing: 0.04em;
    }
    .title-sub:empty { display: none; }

    .title-meta {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    /* バッジ＋部門・氏名を縦に積む */
    .title-meta-stack {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 4px;
    }

    /* 部門・氏名を横一列に並べる */
    .title-meta-items {
      display: flex;
      flex-direction: row;
      gap: 16px;
      align-items: baseline;
    }

    .title-meta-item {
      display: flex;
      align-items: baseline;
      gap: 5px;
    }

    .title-meta-label {
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.22em;
      color: var(--navy);
      opacity: 0.8;
    }

    .title-meta-value {
      font-size: 1.0rem;
      font-weight: 700;
      color: var(--navy);
      letter-spacing: 0.06em;
    }
    .title-meta:empty { display: none; }

    /* ===== 賞バッジ（テキスト）===== */
    .award-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.14em;
    }
    .award-badge.gold   { background: linear-gradient(135deg, #f6de7a, #c9920a); color: #4a2d00; }
    .award-badge.silver { background: linear-gradient(135deg, #e8e8e8, #a0a0a0); color: #2e2e2e; }
    .award-badge.bronze { background: linear-gradient(135deg, #e8b97a, #9a5c1a); color: #3e1c00; }

    /* ===== タイトルカード内のメダル画像 ===== */
    .award-medal {
      height: 110px;
      width: auto;
      flex-shrink: 0;
      filter: drop-shadow(0 2px 10px rgba(0,0,0,0.2));
    }

    /* ===== GMGDDグリッド ===== */
    .flow {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 14px;
      align-items: stretch;
    }

    /* ===== カード ===== */
    .card {
      display: flex;
      flex-direction: column;
      border-radius: 12px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.94);
      border: 1.5px solid rgba(28, 52, 97, 0.14);
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.11);
      transition: transform 0.18s, box-shadow 0.18s;
    }
    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 36px rgba(0, 0, 0, 0.18);
    }

    /* ===== カードヘッダー（全カード共通・紺） ===== */
    .card-header {
      background: var(--navy);
      color: #fff;
      padding: 18px 12px 12px;
      text-align: center;
    }

    .card-label {
      font-family: "Montserrat", sans-serif;
      font-size: clamp(2.2rem, 4.5vw, 3.2rem);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.02em;
    }

    .card-heading {
      font-family: "Noto Sans JP", sans-serif;
      font-size: clamp(0.7rem, 1.2vw, 0.85rem);
      font-weight: 500;
      letter-spacing: 0.14em;
      margin-top: 6px;
      opacity: 0.88;
    }

    /* ===== カードボディ ===== */
    .card-body {
      flex: 1;
      padding: 18px 16px;
    }

    .card-body ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .card-body li {
      position: relative;
      padding-left: 16px;
      font-size: clamp(0.7rem, 1.05vw, 0.86rem);
      font-weight: 400;
      line-height: 1.65;
      color: var(--text);
    }

    .card-body li::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0.62em;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--navy);
      opacity: 0.4;
    }

    /* ===== マスコット ===== */
    .mascot {
      width: 120px;
      height: auto;
      flex-shrink: 0;
      pointer-events: none;
      filter: drop-shadow(0 4px 14px rgba(0, 0, 0, 0.18));
    }

    /* ===== レスポンシブ ===== */
    @media (max-width: 680px) {
      .flow { grid-template-columns: 1fr; }
      .mascot { width: 80px; }
    }

    @media (max-width: 520px) {
      .wrapper { padding: 20px 0 36px; }

      .title-card {
        flex-wrap: wrap;
        padding: 12px 14px;
        gap: 10px;
      }
      .award-medal { height: 64px; }
      .mascot { width: 64px; }

      .title-main { font-size: clamp(1rem, 5.5vw, 1.4rem); }
      .title-sub  { font-size: 0.72rem; }

      .title-meta {
        width: 100%;
        flex-shrink: 1;
      }
      .title-meta-items {
        flex-wrap: wrap;
        gap: 8px 14px;
      }
      .title-meta-value { font-size: 0.88rem; }
    }

    /* ===================================================
       セレクター オーバーレイ
       =================================================== */
    .selector-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--navy);
      z-index: 200;
      overflow-y: auto;
      padding: 48px 20px 72px;
      align-items: flex-start;
      justify-content: center;
    }
    .selector-overlay.active {
      display: flex;
    }
    .selector-overlay.fade-out {
      animation: selectorFadeOut 0.3s ease forwards;
    }
    @keyframes selectorFadeOut {
      to { opacity: 0; pointer-events: none; }
    }

    .selector-wrapper {
      width: min(960px, 100%);
    }

    /* 背景装飾 */
    .selector-overlay::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 30%, rgba(255,255,255,0.04) 0%, transparent 70%),
        radial-gradient(ellipse 60% 50% at 80% 70%, rgba(255,255,255,0.03) 0%, transparent 60%);
      pointer-events: none;
    }

    .selector-header {
      text-align: center;
      margin-bottom: 44px;
    }
    .selector-logo {
      font-family: "Montserrat", sans-serif;
      font-size: clamp(2.8rem, 7vw, 4.5rem);
      font-weight: 900;
      letter-spacing: -0.02em;
      color: #fff;
      line-height: 1;
    }
    .selector-framework-label {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.35em;
      color: rgba(255,255,255,0.55);
      margin-top: 6px;
    }
    .selector-subtitle {
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.65);
      margin-top: 20px;
      letter-spacing: 0.1em;
    }

    /* ===== アイデアカードグリッド ===== */
    .idea-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }

    .idea-selector-card {
      background: rgba(255, 255, 255, 0.93);
      border-radius: 14px;
      border: 1.5px solid rgba(255, 255, 255, 0.15);
      cursor: pointer;
      overflow: hidden;
      transition: transform 0.18s, box-shadow 0.18s, opacity 0.18s;
      box-shadow: 0 4px 20px rgba(0,0,0,0.22);
    }
    .idea-selector-card:hover {
      transform: translateY(-7px);
      box-shadow: 0 18px 52px rgba(0, 0, 0, 0.38);
    }
    .idea-selector-card.loading {
      opacity: 0.45;
      pointer-events: none;
    }

    .selector-card-inner {
      display: flex;
      align-items: center;
      padding: 20px 18px;
      gap: 16px;
    }

    .selector-medal {
      width: 56px;
      height: auto;
      flex-shrink: 0;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.18));
    }
    .selector-medal-placeholder {
      width: 56px;
      height: 56px;
      flex-shrink: 0;
      background: rgba(28,52,97,0.08);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      color: rgba(28,52,97,0.3);
    }

    .selector-card-body {
      flex: 1;
      min-width: 0;
    }
    .selector-card-title {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--navy);
      letter-spacing: 0.04em;
      margin-top: 5px;
      line-height: 1.3;
    }
    .selector-card-meta {
      display: flex;
      gap: 10px;
      font-size: 0.75rem;
      color: var(--text);
      opacity: 0.75;
      margin-top: 6px;
      flex-wrap: wrap;
    }
    .selector-card-meta span + span::before {
      content: "·";
      margin-right: 10px;
    }
    .selector-card-sub {
      font-size: 0.68rem;
      color: var(--text);
      opacity: 0.5;
      margin-top: 4px;
    }

    /* ===== 切り替えボタン（コンテンツ表示中に下部中央に浮く） ===== */
    .switch-btn {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 50;
      background: rgba(28, 52, 97, 0.88);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 28px;
      padding: 9px 28px;
      font-size: 0.82rem;
      font-family: "Noto Sans JP", sans-serif;
      font-weight: 700;
      letter-spacing: 0.1em;
      cursor: pointer;
      box-shadow: 0 4px 18px rgba(0,0,0,0.3);
      transition: background 0.18s, transform 0.18s, opacity 0.18s;
      backdrop-filter: blur(6px);
      white-space: nowrap;
    }
    .switch-btn:hover {
      background: var(--navy);
      transform: translateX(-50%) translateY(-3px);
    }
    .switch-btn.hidden { display: none; }
  </style>
</head>
<body>

  <!-- ===== アイデア選択オーバーレイ ===== -->
  <div id="selector-overlay" class="selector-overlay active">
    <div class="selector-wrapper">
      <div class="selector-header">
        <div class="selector-logo">GMGDD</div>
        <div class="selector-framework-label">IDEA LAB</div>
        <div class="selector-subtitle">表示するアイデアを選択してください</div>
      </div>
      <div id="idea-grid" class="idea-grid"></div>
    </div>
  </div>

  <!-- ===== 切り替えボタン ===== -->
  <button id="switch-btn" class="switch-btn hidden" onclick="showSelector()">
    &#8644; 切り替え
  </button>

  <!-- ===== メインコンテンツ ===== -->
  <div id="page" class="page">
    <img class="bg-img" src="img/consaru.png" alt="" aria-hidden="true" />
    <div class="bg-overlay"></div>

    <div class="wrapper">
      <div class="title-card" id="title-card"></div>
      <div class="flow" id="flow"></div>
    </div>
  </div>

  <script>
    // ===================================================
    // セレクター：manifest.js の IDEAS_MANIFEST を使って
    // アイデア選択UIを構築する
    // ===================================================

    const AWARD_LABEL = { gold: "金賞", silver: "銀賞", bronze: "銅賞" };
    const AWARD_SRC   = { gold: "img/gold_medal.png", silver: "img/silver_medal.png", bronze: "img/bronze_medal.png" };

    (function buildSelector() {
      const grid = document.getElementById("idea-grid");

      IDEAS_MANIFEST.forEach(function (idea) {
        const card = document.createElement("div");
        card.className = "idea-selector-card";

        const medalHTML = (idea.award && AWARD_SRC[idea.award])
          ? `<img class="selector-medal" src="${AWARD_SRC[idea.award]}" alt="${AWARD_LABEL[idea.award] || ""}">`
          : `<div class="selector-medal-placeholder">&#128161;</div>`;

        const badgeHTML = (idea.award && AWARD_LABEL[idea.award])
          ? `<span class="award-badge ${idea.award}">${AWARD_LABEL[idea.award]}</span>`
          : "";

        const deptHTML = idea.department ? `<span>${idea.department}</span>` : "";
        const nameHTML = idea.name       ? `<span>${idea.name}</span>`       : "";

        card.innerHTML = `
          <div class="selector-card-inner">
            ${medalHTML}
            <div class="selector-card-body">
              ${badgeHTML}
              <div class="selector-card-title">${idea.title}</div>
              <div class="selector-card-meta">${deptHTML}${nameHTML}</div>
              <div class="selector-card-sub">${idea.sub || ""}</div>
            </div>
          </div>
        `;

        card.addEventListener("click", function () { loadIdea(idea); });
        grid.appendChild(card);
      });
    })();

    // ===================================================
    // JSファイルの動的読み込み
    // ===================================================

    var _loadedScript = null;

    function loadIdea(idea) {
      // ローディング状態にする
      document.querySelectorAll(".idea-selector-card").forEach(function (c) {
        c.classList.add("loading");
      });

      // 前回のスクリプトを削除
      if (_loadedScript) {
        _loadedScript.remove();
        _loadedScript = null;
      }

      var script = document.createElement("script");
      // キャッシュ対策のタイムスタンプを付与
      script.src = idea.file + "?t=" + Date.now();

      script.onload = function () {
        renderPage();
        hideSelector();
      };

      script.onerror = function () {
        alert("ファイルの読み込みに失敗しました:\n" + idea.file);
        document.querySelectorAll(".idea-selector-card").forEach(function (c) {
          c.classList.remove("loading");
        });
      };

      document.head.appendChild(script);
      _loadedScript = script;
    }

    function hideSelector() {
      var overlay = document.getElementById("selector-overlay");
      overlay.classList.add("fade-out");
      setTimeout(function () {
        overlay.classList.remove("active", "fade-out");
        document.getElementById("switch-btn").classList.remove("hidden");
      }, 300);
    }

    function showSelector() {
      var overlay = document.getElementById("selector-overlay");
      overlay.classList.add("active");
      document.getElementById("switch-btn").classList.add("hidden");
      // ローディング状態をリセット
      document.querySelectorAll(".idea-selector-card").forEach(function (c) {
        c.classList.remove("loading");
      });
    }

    // ===================================================
    // レンダリング（content*.js がロードされた後に呼ばれる）
    // ===================================================

    function renderPage() {
      // リセット
      document.getElementById("title-card").innerHTML = "";
      document.getElementById("flow").innerHTML = "";

      // --- タイトルカード ---
      var t = GMGDD.title;
      var mainText  = (typeof t === "object") ? t.main             : t;
      var subText   = (typeof t === "object") ? (t.sub        || "") : "";
      var deptText  = (typeof t === "object") ? (t.department || "") : "";
      var nameText  = (typeof t === "object") ? (t.name       || "") : "";
      var awardKey  = (typeof t === "object") ? (t.award      || "") : "";

      var badgeHTML = (awardKey && AWARD_LABEL[awardKey])
        ? `<div class="award-badge ${awardKey}">${AWARD_LABEL[awardKey]}</div>` : "";

      var metaHTML = `
        <div class="title-meta">
          <div class="title-meta-stack">
            ${badgeHTML}
            <div class="title-meta-items">
              ${deptText ? `<div class="title-meta-item"><span class="title-meta-label">部門</span><span class="title-meta-value">${deptText}</span></div>` : ""}
              ${nameText ? `<div class="title-meta-item"><span class="title-meta-label">氏名</span><span class="title-meta-value">${nameText}</span></div>` : ""}
            </div>
          </div>
          <img class="mascot" src="img/otsukare.png" alt="マスコット" />
        </div>`;

      var medalHTML = (awardKey && AWARD_SRC[awardKey])
        ? `<img class="award-medal" src="${AWARD_SRC[awardKey]}" alt="${AWARD_LABEL[awardKey] || ""}">` : "";

      document.getElementById("title-card").innerHTML = `
        ${medalHTML}
        <div class="title-left">
          <div class="title-label">IDEA PROPOSAL</div>
          <div class="title-main">${mainText}</div>
          <div class="title-sub">${subText}</div>
        </div>
        ${metaHTML}
      `;

      // --- GMGDD カード ---
      var order = [
        { key: "G1", data: GMGDD.G1 },
        { key: "M",  data: GMGDD.M  },
        { key: "G2", data: GMGDD.G2 },
        { key: "D1", data: GMGDD.D1 },
        { key: "D2", data: GMGDD.D2 },
      ];

      var flow = document.getElementById("flow");
      order.forEach(function (item) {
        var card = document.createElement("div");
        card.className = "card";
        card.dataset.key = item.key;
        card.innerHTML = `
          <div class="card-header">
            <div class="card-label">${item.data.label}</div>
            <div class="card-heading">${item.data.heading}</div>
          </div>
          <div class="card-body">
            <ul>${item.data.points.map(function (p) { return `<li>${p}</li>`; }).join("")}</ul>
          </div>
        `;
        flow.appendChild(card);
      });
    }
  </script>
</body>
</html>
